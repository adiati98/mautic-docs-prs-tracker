name: Update Docs PR Tracker

on:
  schedule:
    # All times target the same Central European local wall-clock hour
    # year-round. GitHub Actions cron has no DST support, so each rule is
    # duplicated for CEST (UTC+2, roughly Apr-Oct) and CET (UTC+1, roughly
    # Nov-Mar), restricted via the month field. This only leaves drift
    # during the DST transition weeks themselves (late Mar / late Oct),
    # instead of for half the year - accepted tradeoff for an internal tool.
    #
    # Incremental update, every half hour, 9am-9pm CE time, Mon-Fri. Split
    # into two rules so the window closes exactly at 9pm (a single "9-21"
    # hour range with :00/:30 minutes would run over into 9:30pm).
    - cron: "0,30 7-18 * 4-10 1-5" # CEST: 9am-9pm = 7-19 UTC
    - cron: "0 19 * 4-10 1-5"
    - cron: "0,30 8-19 * 11,12,1,2,3 1-5" # CET: 9am-9pm = 8-20 UTC
    - cron: "0 20 * 11,12,1,2,3 1-5"
    # Weekend: two incremental check-ins each day (Sat and Sun), 10am and
    # 9pm CE time - same cadence both days.
    - cron: "0 8 * 4-10 6,0" # CEST: 10am = 8 UTC, 9pm = 19 UTC
    - cron: "0 19 * 4-10 6,0"
    - cron: "0 9 * 11,12,1,2,3 6,0" # CET: 10am = 9 UTC, 9pm = 20 UTC
    - cron: "0 20 * 11,12,1,2,3 6,0"
    # Weekly full resync - midnight Monday CE time, its own separate slot
    # rather than reusing Sunday's 9pm incremental run above.
    - cron: "0 22 * 4-10 0" # CEST: midnight Mon = 22 UTC Sun
    - cron: "0 23 * 11,12,1,2,3 0" # CET: midnight Mon = 23 UTC Sun
  workflow_dispatch:
    inputs:
      fresh:
        description: "Force a full fresh fetch (ignore the cache)"
        type: boolean
        default: false

# Serialize runs instead of racing on data/pr-cache.json or the git branch -
# a manual dispatch overlapping a scheduled run waits rather than cancels,
# since cancelling mid-fetch or mid-push could leave things half-updated.
concurrency:
  group: docs-pr-tracker
  cancel-in-progress: false

# Deny-by-default; each job grants only what it needs.
permissions: {}

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "22"

      # GITHUB_TOKEN here is the tracker's own read-only PAT (repo secret),
      # used only for GitHub API reads against the public mautic/* repos -
      # unrelated to the ambient token used below to push back to this repo.
      - name: Run tracker
        env:
          GITHUB_TOKEN: ${{ secrets.TRACKER_PAT }}
        run: |
          if [ "${{ github.event.schedule }}" = "0 22 * 4-10 0" ] || [ "${{ github.event.schedule }}" = "0 23 * 11,12,1,2,3 0" ] || [ "${{ inputs.fresh }}" = "true" ]; then
            echo "Running full fresh fetch..."
            node tracker.js --fresh
          else
            echo "Running incremental update..."
            node tracker.js
          fi

      - name: Commit and push updated report + cache
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tracker-report.html tracker-reminders.html tracker-guide.html data/pr-cache.json
          if ! git diff --staged --quiet; then
            git commit -m "chore: update tracker report [skip ci]"
            git push
          else
            echo "No changes to commit"
          fi

      - name: Stage report for Pages
        run: |
          mkdir -p _site
          # Published under both names: index.html is the Pages entry point,
          # and the plain filenames keep the dashboard's, reminders page's,
          # and guide's cross-links (which use their local dev filenames)
          # working on the deployed site too.
          cp tracker-report.html _site/index.html
          cp tracker-report.html _site/tracker-report.html
          cp tracker-reminders.html _site/tracker-reminders.html
          cp tracker-guide.html _site/tracker-guide.html

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    needs: update
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
